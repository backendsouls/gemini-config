name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v5
        with:
          context: ./sandboxes/base
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:latest
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-others:
    needs: build-and-push-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript, go, rust, ruby, java, php, lua, cpp, all]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.language }} Image
        uses: docker/build-push-action@v5
        with:
          context: ./sandboxes/${{ matrix.language }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-${{ matrix.language == 'javascript' && 'js' || matrix.language }}:latest
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-${{ matrix.language == 'javascript' && 'js' || matrix.language }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
