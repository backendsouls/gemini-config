name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push-base:
    runs-on: ubuntu-latest
    environment: gha
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v7
        with:
          context: ./sandboxes/base
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:latest
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-others:
    needs: build-and-push-base
    runs-on: ubuntu-latest
    environment: gha
    strategy:
      matrix:
        language: [python, javascript, go, rust, ruby, java, php, lua, cpp, all]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.language }} Image
        uses: docker/build-push-action@v7
        with:
          context: ./sandboxes/${{ matrix.language }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-${{ matrix.language == 'javascript' && 'js' || matrix.language }}:latest
            ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-${{ matrix.language == 'javascript' && 'js' || matrix.language }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-descriptions:
    needs: build-and-push-others
    runs-on: ubuntu-latest
    environment: gha
    strategy:
      matrix:
        image: [base, python, js, go, rust, ruby, java, php, lua, cpp, all]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub Description for ${{ matrix.image }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ secrets.DOCKER_USERNAME }}/gemini-sandbox-${{ matrix.image }}
          short-description: "Gemini CLI Sandbox Environment - ${{ matrix.image }} variant"
          readme-filepath: ./sandboxes/${{ matrix.image == 'js' && 'javascript' || matrix.image }}/README.md
