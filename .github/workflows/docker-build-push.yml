name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Fallback to DOCKER_USERNAME secret if DOCKER_NAMESPACE variable is not set
  DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE || secrets.DOCKER_USERNAME }}

jobs:
  build-and-push-base:
    runs-on: ubuntu-latest
    environment: gha
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/gemini-sandbox-base
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v7
        with:
          context: ./sandboxes/base
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-others:
    needs: build-and-push-base
    runs-on: ubuntu-latest
    environment: gha
    strategy:
      matrix:
        language: [python, javascript, go, rust, ruby, java, php, lua, cpp, all]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_NAMESPACE }}/gemini-sandbox-${{ matrix.language == 'javascript' && 'js' || matrix.language }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.language }} Image
        uses: docker/build-push-action@v7
        with:
          context: ./sandboxes/${{ matrix.language }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ env.DOCKER_NAMESPACE }}/gemini-sandbox-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-descriptions:
    needs: build-and-push-others
    runs-on: ubuntu-latest
    environment: gha
    strategy:
      matrix:
        image: [base, python, js, go, rust, ruby, java, php, lua, cpp, all]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update Docker Hub Description for ${{ matrix.image }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ env.DOCKER_NAMESPACE }}/gemini-sandbox-${{ matrix.image }}
          short-description: "Opinionated unofficial Gemini CLI sandbox for ${{ matrix.image }}. High-performance, Debian-based, pre-configured with essential extensions."
          readme-filepath: ./sandboxes/${{ matrix.image == 'js' && 'javascript' || matrix.image }}/README.md
